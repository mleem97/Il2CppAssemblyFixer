# .github/workflows/build-release.yml
name: Build & Auto-Release Self-Contained App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  # Automatische Releases bei Tags (v1.0.0, v1.0.1, etc.)
  create:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write  # Für auto-releases

    steps:
    # === CHECKOUT ===
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # === .NET 8 Setup ===
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # === MSBuild Setup ===
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # === Version ermitteln ===
    - name: Get version
      id: version
      uses: irelly/releaser@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # Falls kein Tag: latest commit hash
        # Falls Tag vorhanden: Tag-Name (v1.0.0)

    - name: Display version
      run: echo "Building version: ${{ steps.version.outputs.version }}"

    # === Restore ===
    - name: Restore
      run: dotnet restore Il2CppAssemblyFixer.sln

    # === Build self-contained EXE (x64) ===
    - name: Build Self-Contained x64
      run: |
        dotnet publish Il2CppAssemblyFixer/Il2CppAssemblyFixer.csproj \
          -c Release \
          -r win-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:Version=${{ steps.version.outputs.version }} \
          -o publish/win-x64 \
          /p:PublishReadyToRun=true

    # === Build self-contained EXE (x86) ===
    - name: Build Self-Contained x86
      run: |
        dotnet publish Il2CppAssemblyFixer/Il2CppAssemblyFixer.csproj \
          -c Release \
          -r win-x86 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:Version=${{ steps.version.outputs.version }} \
          -o publish/win-x86 \
          /p:PublishReadyToRun=true

    # === ZIPs erstellen ===
    - name: Create ZIP archives
      run: |
        mkdir release
        7z a release/Il2CppAssemblyFixer_${{ steps.version.outputs.version }}_x64.zip publish/win-x64/*
        7z a release/Il2CppAssemblyFixer_${{ steps.version.outputs.version }}_x86.zip publish/win-x86/*
        7z a release/Il2CppAssemblyFixer_${{ steps.version.outputs.version }}_both.zip release/*.zip

    # === Artifact upload ===
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Il2CppAssemblyFixer-${{ steps.version.outputs.version }}
        path: release/

  # === AUTO-RELEASE (nur bei Tags) ===
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')  # Nur bei Tags
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: Il2CppAssemblyFixer-*
        path: artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/**/*
        generate_release_notes: true
        tag_name: ${{ github.ref_name }}
        name: Il2CppAssemblyFixer ${{ github.ref_name }}
        body: |
          # Il2CppAssemblyFixer ${{ github.ref_name }}
          
          ## Self-Contained EXEs:
          - ✅ **x64**: `Il2CppAssemblyFixer_${{ github.ref_name }}_x64.zip`
          - ✅ **x86**: `Il2CppAssemblyFixer_${{ github.ref_name }}_x86.zip`
          
          ## Features:
          - Single-file EXE (10-15MB)
          - Self-contained (.NET 8 nicht nötig)
          - Verbose Logging
          - Auto-Detection Steam/Data Center
          - Duplicate Type Removal
          
          ## Usage:
          ```
          Il2CppAssemblyFixer.exe
          # oder mit Pfad:
          Il2CppAssemblyFixer.exe "C:\Pfad\zu\Il2CppAssemblies"
          ```

  # === TEST ===
  test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    - name: Test
      run: dotnet test --no-build --verbosity normal
