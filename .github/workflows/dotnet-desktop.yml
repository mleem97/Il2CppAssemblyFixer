name: .NET 10 Build & Release

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    # Optional: Cache für schnellere Builds
    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore Il2CppAssemblyFixer.sln

    # === PUBLISH x64 ===
    - name: Publish x64
      run: |
        dotnet publish Il2CppAssemblyFixer.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -o publish/win-x64

    # === PUBLISH x86 ===
    - name: Publish x86
      run: |
        dotnet publish Il2CppAssemblyFixer.csproj `
          -c Release `
          -r win-x86 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -o publish/win-x86

    # === Linux Bonus ===
    - name: Publish Linux x64
      run: |
        dotnet publish Il2CppAssemblyFixer.csproj `
          -c Release `
          -r linux-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -o publish/linux-x64

    # === ZIPs erstellen ===
    - name: Create Release Assets
      shell: pwsh
      run: |
        $version = if ($env:GITHUB_REF_NAME -match '^v') { $env:GITHUB_REF_NAME } else { "dev-$($env:GITHUB_RUN_ID)" }
        New-Item -ItemType Directory -Force -Path "assets"
        Compress-Archive -Path "publish/win-x64/Il2CppAssemblyFixer.exe" -DestinationPath "assets/Il2CppAssemblyFixer_${version}_win-x64.zip"
        Compress-Archive -Path "publish/win-x86/Il2CppAssemblyFixer.exe" -DestinationPath "assets/Il2CppAssemblyFixer_${version}_win-x86.zip"
        Compress-Archive -Path "publish/linux-x64/Il2CppAssemblyFixer" -DestinationPath "assets/Il2CppAssemblyFixer_${version}_linux-x64.zip"

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Il2CppAssemblyFixer-Build
        path: assets/*.zip

  release:
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: Il2CppAssemblyFixer-Build
        path: ./
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: "*.zip"
        generate_release_notes: true
        prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
        tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('dev-{0}', github.run_id) }}
