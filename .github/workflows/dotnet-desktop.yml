# .github/workflows/build-release.yml (angepasst)
name: Build & Auto-Release Il2CppAssemblyFixer

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  create:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # === NET 6 Setup ===
    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    # === Build x64 ===
    - name: Publish x64 Self-Contained
      run: |
        dotnet publish Il2CppAssemblyFixer.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=true `
          -o publish/x64

    # === Build x86 ===
    - name: Publish x86 Self-Contained  
      run: |
        dotnet publish Il2CppAssemblyFixer.csproj `
          -c Release `
          -r win-x86 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=true `
          -o publish/x86

    # === ZIPs ===
    - name: Create Release ZIPs
      shell: pwsh
      run: |
        $version = (git describe --tags --abbrev=0).TrimStart('v')
        Compress-Archive -Path "publish/x64/*" -DestinationPath "Il2CppAssemblyFixer_${version}_x64.zip"
        Compress-Archive -Path "publish/x86/*" -DestinationPath "Il2CppAssemblyFixer_${version}_x86.zip"

    # === Upload ===
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Il2CppAssemblyFixer-Binaries
        path: "*.zip"

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts/
    
    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/Il2CppAssemblyFixer-Binaries/*.zip
        generate_release_notes: true
