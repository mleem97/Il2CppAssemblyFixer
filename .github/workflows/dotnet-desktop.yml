name: .NET Build & Release

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Setup .NET 6
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '6.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore
      run: dotnet restore Il2CppAssemblyFixer.sln

    # ── EXE: Windows x64, self-contained single file ──────────────────────
    - name: Publish EXE win-x64
      run: |
        dotnet publish Il2CppAssemblyFixer.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -o publish/win-x64

    # ── EXE: Linux x64, self-contained single file ────────────────────────
    - name: Publish EXE linux-x64
      run: |
        dotnet publish Il2CppAssemblyFixer.csproj `
          -c Release `
          -r linux-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -o publish/linux-x64

    # ── MelonLoader Plugin DLL (net6, framework-dependent) ────────────────
    - name: Publish MelonLoader Plugin
      run: |
        dotnet publish MelonPlugin/Il2CppAssemblyFixerPlugin.csproj `
          -c Release `
          --self-contained false `
          -o publish/plugin

    # ── ZIPs ──────────────────────────────────────────────────────────────
    - name: Create release assets
      shell: pwsh
      run: |
        $version = if ($env:GITHUB_REF_NAME -match '^v') {
          $env:GITHUB_REF_NAME
        } else {
          "dev-$($env:GITHUB_RUN_ID)"
        }
        New-Item -ItemType Directory -Force -Path assets | Out-Null

        # Windows EXE
        Compress-Archive `
          -Path   "publish/win-x64/Il2CppAssemblyFixer.exe" `
          -DestinationPath "assets/Il2CppAssemblyFixer_${version}_win-x64.zip"

        # Linux EXE (no .exe extension on linux binary)
        Compress-Archive `
          -Path   "publish/linux-x64/Il2CppAssemblyFixer" `
          -DestinationPath "assets/Il2CppAssemblyFixer_${version}_linux-x64.zip"

        # Plugin: only the three managed DLLs MelonLoader needs
        $pluginFiles = Get-ChildItem "publish/plugin" -File |
          Where-Object {
            $_.Extension -eq ".dll" -and $_.Name -in @(
              "Il2CppAssemblyFixerPlugin.dll",
              "dnlib.dll",
              "Mono.Cecil.dll"
            )
          }
        Compress-Archive `
          -Path            $pluginFiles.FullName `
          -DestinationPath "assets/Il2CppAssemblyFixerPlugin_${version}_MelonLoader.zip"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Il2CppAssemblyFixer-Build
        path: assets/*.zip

  # ── GitHub Release (only on version tags) ─────────────────────────────
  release:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: Il2CppAssemblyFixer-Build
        path: ./

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.zip"
        generate_release_notes: true
        prerelease: false
